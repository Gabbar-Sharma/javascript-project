<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Javascript project</title>
      <link href="/src/style.css" rel="stylesheet">

  </head>
  
  <body>
    <div id="app">
      <div class="bg-gray-100 h-200 flex flex-col items-center justify-start p-8">
        <h1 class="text-2xl font-bold text-black pb-2">My JavaScript Project</h1>
      <div class=" flex h-30 items-center justify-center  w-1/2">
         <input type="text" id="input" class="border-2 w-full border-gray-500 rounded-lg p-2 m-2" placeholder="Write something..." /> 
         <button id="button" class="bg-blue-500 text-white rounded-lg p-2 m-2">Save</button>  
         
      </div>
      <div class="w-1/2 bg-white rounded-lg shadow-md p-4 mt-4">
            <h2 class="text-xl text-start font-bold mb-4">Saved Items:</h2>
            <ul id="list" class="list-disc list-inside">
           <div id="ul" class="flex items-center justify-around mb-4 w-full">
             <li id="li" class="mb-2 w-1/2 list-none">Example item 1</li>
            <div class="flex items-center w-1/2 justify-end">
               <button class="bg-red-500 cursor-alias text-white rounded-lg p-2 m-2">Delete</button>
             <button class="bg-green-500 cursor-pointer text-white rounded-lg p-2 m-2">Edit</button>
             <button class="bg-yellow-500 cursor-pointer text-white rounded-lg p-2 m-2">Mark</button>
            </div>

           </div>
              <!-- Saved items will appear here -->
            </ul>
         </div> 
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
